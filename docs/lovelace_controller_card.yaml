type: picture-elements
image: /local/comair/lcd_transparent.png
elements:
  - type: icon
    icon: mdi:clock-outline
    style:
      top: 6%
      left: 6%
      color: rgba(255,255,255,0.3)
      "--mdi-icon-size": 16px
  - type: state-label
    entity: sensor.time
    tap_action:
      action: more-info
    style:
      top: 6%
      left: 16%
      font-size: 12px
      color: rgba(255,255,255,0.4)
      cursor: pointer
  - type: state-label
    entity: sensor.date
    tap_action:
      action: more-info
    style:
      top: 6%
      left: 28%
      font-size: 12px
      color: rgba(255,255,255,0.4)
      cursor: pointer
  - type: conditional
    conditions:
      - entity: sensor.comair_hruc_plus_3_varovania
        state_not: "OK"
      - entity: sensor.comair_hruc_plus_3_varovania
        state_not: "0"
      - entity: sensor.comair_hruc_plus_3_varovania
        state_not: "unknown"
      - entity: sensor.comair_hruc_plus_3_varovania
        state_not: "unavailable"
    elements:
      - type: icon
        icon: mdi:alert
        style:
          top: 6%
          left: 92%
          color: rgba(255,180,50,0.8)
          "--mdi-icon-size": 18px
  - type: icon
    icon: mdi:home-import-outline
    style:
      top: 22%
      left: 12%
      color: rgba(255,255,255,0.3)
      "--mdi-icon-size": 18px
  - type: state-label
    entity: sensor.comair_hruc_plus_3_teplota_nasavania
    style:
      top: 35%
      left: 14%
      font-size: 22px
      font-weight: bold
      color: rgba(255,255,255,0.85)
  - type: state-label
    entity: sensor.comair_hruc_plus_3_teplota_odvodneho_vzduchu
    style:
      top: 30%
      left: 50%
      font-size: 48px
      font-weight: bold
      color: white
      text-shadow: 0 0 10px rgba(255,255,255,0.15)
  - type: icon
    icon: mdi:water-percent
    style:
      top: 22%
      left: 88%
      color: rgba(255,255,255,0.3)
      "--mdi-icon-size": 18px
  - type: state-label
    entity: sensor.comair_hruc_plus_3_vlhkost_odvodu
    style:
      top: 35%
      left: 87%
      font-size: 22px
      font-weight: bold
      color: rgba(255,255,255,0.85)
  - type: icon
    icon: mdi:heat-wave
    style:
      top: 52%
      left: 8%
      color: rgba(255,255,255,0.35)
      "--mdi-icon-size": 20px
  - type: state-label
    entity: sensor.comair_hruc_plus_3_ucinnost_rekuperacie
    style:
      top: 52%
      left: 20%
      font-size: 18px
      color: rgba(255,255,255,0.7)
  - type: conditional
    conditions:
      - entity: select.comair_hruc_plus_3_ventilation_mode
        state: Auto
    elements:
      - type: icon
        icon: mdi:fan-auto
        tap_action:
          action: more-info
          entity: select.comair_hruc_plus_3_ventilation_mode
        style:
          top: 50%
          left: 50%
          color: rgba(255,255,255,0.8)
          "--mdi-icon-size": 58px
          cursor: pointer
  - type: conditional
    conditions:
      - entity: select.comair_hruc_plus_3_ventilation_mode
        state: Low
    elements:
      - type: icon
        icon: mdi:fan-speed-1
        tap_action:
          action: more-info
          entity: select.comair_hruc_plus_3_ventilation_mode
        style:
          top: 50%
          left: 50%
          color: rgba(255,255,255,0.8)
          "--mdi-icon-size": 58px
          cursor: pointer
  - type: conditional
    conditions:
      - entity: select.comair_hruc_plus_3_ventilation_mode
        state: Medium
    elements:
      - type: icon
        icon: mdi:fan-speed-2
        tap_action:
          action: more-info
          entity: select.comair_hruc_plus_3_ventilation_mode
        style:
          top: 50%
          left: 50%
          color: rgba(255,255,255,0.8)
          "--mdi-icon-size": 58px
          cursor: pointer
  - type: conditional
    conditions:
      - entity: select.comair_hruc_plus_3_ventilation_mode
        state: High
    elements:
      - type: icon
        icon: mdi:fan-speed-3
        tap_action:
          action: more-info
          entity: select.comair_hruc_plus_3_ventilation_mode
        style:
          top: 50%
          left: 50%
          color: rgba(255,255,255,0.8)
          "--mdi-icon-size": 58px
          cursor: pointer
  - type: conditional
    conditions:
      - entity: select.comair_hruc_plus_3_ventilation_mode
        state: Boost
    elements:
      - type: icon
        icon: mdi:fan-alert
        tap_action:
          action: more-info
          entity: select.comair_hruc_plus_3_ventilation_mode
        style:
          top: 50%
          left: 50%
          color: rgba(255,200,50,0.9)
          "--mdi-icon-size": 58px
          cursor: pointer
  - type: state-label
    entity: select.comair_hruc_plus_3_ventilation_mode
    tap_action:
      action: more-info
    style:
      top: 62%
      left: 50%
      font-size: 15px
      font-weight: bold
      color: rgba(255,255,255,0.8)
      cursor: pointer

  # Smiley — happy is always shown as base layer.
  # Neutral/sad overlay on top ONLY when real codes are present.
  - type: icon
    icon: mdi:emoticon-happy-outline
    style:
      top: 52%
      left: 88%
      color: rgba(255,255,255,0.7)
      "--mdi-icon-size": 36px

  # Overlay neutral when warnings have a real code (not OK/0/unknown/unavailable)
  - type: conditional
    conditions:
      - entity: sensor.comair_hruc_plus_3_varovania
        state_not: "OK"
      - entity: sensor.comair_hruc_plus_3_varovania
        state_not: "0"
      - entity: sensor.comair_hruc_plus_3_varovania
        state_not: "unknown"
      - entity: sensor.comair_hruc_plus_3_varovania
        state_not: "unavailable"
    elements:
      - type: icon
        icon: mdi:emoticon-neutral-outline
        style:
          top: 52%
          left: 88%
          color: rgba(255,200,50,0.9)
          "--mdi-icon-size": 36px

  # Overlay sad when faults have a real code (not OK/0/unknown/unavailable)
  - type: conditional
    conditions:
      - entity: sensor.comair_hruc_plus_3_poruchy
        state_not: "OK"
      - entity: sensor.comair_hruc_plus_3_poruchy
        state_not: "0"
      - entity: sensor.comair_hruc_plus_3_poruchy
        state_not: "unknown"
      - entity: sensor.comair_hruc_plus_3_poruchy
        state_not: "unavailable"
    elements:
      - type: icon
        icon: mdi:emoticon-sad-outline
        style:
          top: 52%
          left: 88%
          color: rgba(255,80,80,0.9)
          "--mdi-icon-size": 36px

  - type: icon
    icon: mdi:arrow-left
    style:
      top: 71%
      left: 6%
      color: rgba(255,255,255,0.25)
      "--mdi-icon-size": 16px
  - type: state-label
    entity: sensor.comair_hruc_plus_3_rychlost_ventilatora_privodu
    style:
      top: 71%
      left: 18%
      font-size: 22px
      font-weight: bold
      color: rgba(255,255,255,0.85)
  - type: state-label
    entity: sensor.comair_hruc_plus_3_rychlost_ventilatora_odvodu
    style:
      top: 71%
      left: 82%
      font-size: 22px
      font-weight: bold
      color: rgba(255,255,255,0.85)
  - type: icon
    icon: mdi:arrow-right
    style:
      top: 71%
      left: 94%
      color: rgba(255,255,255,0.25)
      "--mdi-icon-size": 16px
  - type: state-label
    entity: sensor.comair_hruc_plus_3_prikon
    prefix: "⚡ "
    tap_action:
      action: more-info
    style:
      top: 90%
      left: 10%
      font-size: 12px
      color: rgba(255,255,255,0.4)
      cursor: pointer
  - type: state-label
    entity: sensor.comair_hruc_plus_3_energy
    tap_action:
      action: more-info
    style:
      top: 90%
      left: 32%
      font-size: 12px
      color: rgba(255,255,255,0.4)
      cursor: pointer
  - type: state-label
    entity: sensor.comair_hruc_plus_3_doba_prevadzky
    tap_action:
      action: more-info
    style:
      top: 90%
      left: 52%
      font-size: 12px
      color: rgba(255,255,255,0.4)
      cursor: pointer
  - type: state-label
    entity: sensor.comair_hruc_plus_3_casovac_filtra
    prefix: "Filter: "
    style:
      top: 86%
      left: 88%
      font-size: 12px
      color: rgba(255,255,255,0.4)
  - type: state-label
    entity: sensor.comair_hruc_plus_3_servisny_casovac
    prefix: "Servis: "
    style:
      top: 94%
      left: 87%
      font-size: 12px
      color: rgba(255,255,255,0.4)
